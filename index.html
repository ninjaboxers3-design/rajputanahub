<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Debunking the Biggest Fraud in History</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000000; /* full black */
      color: white;
      font-family: "Futura", "Trebuchet MS", Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: popIn 1s ease-out;
    }

    img {
      max-width: 400px;
      width: 90%;
      height: auto;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 1px;
    }

    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- IMPORTANT: use your GitHub file name exactly -->
