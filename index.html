<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debunking the Biggest Fraud in History</title>

  <style>
    /* Use BOOK font */
    @font-face {
      font-family: 'FuturaBook';
      src: url('FuturaCyrillicBook.ttf') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'FuturaBook', Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .container {
      text-align: center;
      animation: popIn 1s ease-out;
    }

    /* 🔥 Bigger image */
    .main-img {
      width: 600px; /* increased */
      max-width: 95%;
      height: auto;
      margin-bottom: 30px;
    }

    /* 🔥 ALL CAPS */
    h1 {
      font-size: 2.2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Instagram icon */
    .instagram {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .instagram img {
      width: 35px;
      height: 35px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .instagram img:hover {
      transform: scale(1.1);
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.85);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>

  <!-- Instagram -->
  <a href="https://www.instagram.com/maratha.imperium/" target="_blank" class="instagram">
    <img src="instagram.webp" alt="Instagram">
  </a>

  <!-- Content -->
  <div class="container">
    <img src="rajputanaimg.png" class="main-img" alt="Main Image">
    <h1>DEBUNKING THE BIGGEST FRAUD IN HISTORY</h1>
  </div>

</body>
</html>
