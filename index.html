<!DOCTYPE html>
<html>
<head>
  <title>RajputanaHub</title>

  <style>
    @font-face {
      font-family: 'FuturaBook';
      src: url('FuturaCyrillicBook.ttf');
    }

    body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'FuturaBook';
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      opacity: 0;
      transition: 0.4s;
    }

    body.show {
      opacity: 1;
    }

    .top-left {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 18px;
    }

    .top-left a {
      margin-right: 20px;
      color: gray;
      text-decoration: none;
      transition: 0.2s;
    }

    .top-left a:hover {
      color: orange;
    }
  </style>
</head>

<body>

<div class="top-left">
  <a href="signup.html" id="signup">SIGN UP</a>
  <a href="login.html" id="login">LOGIN</a>
</div>

<script>
window.onload = () => document.body.classList.add("show");

document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e) {
    e.preventDefault();
    document.body.style.opacity = "0";
    setTimeout(() => {
      window.location.href = this.href;
    }, 300);
  });
});
</script>

</body>
</html>
