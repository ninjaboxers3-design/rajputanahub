<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debunking the Biggest Fraud in History</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d1117; /* GitHub dark style */
      color: white;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 1.2s ease;
    }

    .container img {
      max-width: 350px;
      width: 90%;
      height: auto;
      display: block;
      margin: 0 auto 20px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.08);
    }

    .container h1 {
      font-size: 2rem;
      font-weight: bold;
      color: #f0f6fc;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.08);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://freeimage.host/i/wmremove-transformed-1.B06dw9R" alt="Centered Image" />
    <h1>Debunking the Biggest Fraud in History</h1>
  </div>
</body>
</html>
