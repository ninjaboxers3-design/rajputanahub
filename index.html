<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debunking the Biggest Fraud in History</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000000; /* full black */
      color: #ffffff;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      animation: popIn 1s ease-out;
    }

    .container img {
      width: 400px;
      max-width: 90%;
      height: auto;
      margin-bottom: 20px;
    }

    .container h1 {
      font-size: 2rem;
      letter-spacing: 1px;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.85);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="rajputanaimg.png" alt="Image">
    <h1>Debunking the Biggest Fraud in History</h1>
  </div>
</body>
</html>
