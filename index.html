<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RajputanaHub</title>

  <style>
    /* 🔥 Use BOOK font */
    @font-face {
      font-family: 'FuturaBook';
      src: url('FuturaCyrillicBook.ttf') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'FuturaBook', Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .container {
      text-align: center;
      animation: fadeIn 1s ease-out;
    }

    /* 🔥 BIG TITLE */
    .title {
      font-size: 4.5rem;  /* increased a lot */
      font-weight: bold;
      margin-bottom: 20px;
    }

    /* Orange Hub box */
    .hub {
      background: #f39c12;
      color: #000;
      padding: 5px 15px;
      border-radius: 10px;
      margin-left: 10px;
    }

    /* Subtitle */
    .subtitle {
      font-size: 1.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Instagram */
    .instagram {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .instagram img {
      width: 35px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .instagram img:hover {
      transform: scale(1.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>

  <!-- Instagram -->
  <a href="https://www.instagram.com/maratha.imperium/" target="_blank" class="instagram">
    <img src="instagram.webp">
  </a>

  <!-- Content -->
  <div class="container">
    <div class="title">
      Rajputana<span class="hub">Hub</span>
    </div>

    <div class="subtitle">
      DEBUNKING THE BIGGEST FRAUD IN HISTORY
    </div>
  </div>

</body>
</html>
