<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Database</title>

  <style>
    @font-face {
      font-family: 'FuturaBook';
      src: url('FuturaCyrillicBook.ttf') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'FuturaBook', Arial, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
    }

    .topbar {
      width: 100%;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e1e1e;
      position: sticky;
      top: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(8px);
      z-index: 50;
    }

    .left-profile {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
    }

    .left-profile img {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      object-fit: cover;
      background: #1a1a1a;
      border: 1px solid #333;
    }

    .profile-meta {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .profile-name {
      font-size: 1rem;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .profile-role {
      font-size: 0.8rem;
      color: #8a8a8a;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .nav-center {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .nav-link {
      color: #777;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.95rem;
      transition: 0.2s ease;
      cursor: pointer;
    }

    .nav-link:hover,
    .nav-link.active {
      color: #fff;
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    .top-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .search {
      width: 260px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #2e2e2e;
      background: #141414;
      color: #fff;
      outline: none;
    }

    .btn {
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      background: #f39c12;
      color: #000;
      cursor: pointer;
      font-size: 0.95rem;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #ffae2b;
    }

    .btn.gray {
      background: #2a2a2a;
      color: #fff;
    }

    .btn.gray:hover {
      background: #3a3a3a;
    }

    .page {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      padding: 28px;
    }

    .sidebar,
    .main {
      min-width: 0;
    }

    .panel {
      background: #0f0f0f;
      border: 1px solid #1f1f1f;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 22px;
    }

    .panel-title {
      font-size: 1.15rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 18px;
      color: #fff;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .input,
    .textarea,
    .file-input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid #2d2d2d;
      background: #171717;
      color: #fff;
      padding: 14px 16px;
      outline: none;
    }

    .input:focus,
    .textarea:focus {
      border-color: #f39c12;
      box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.12);
    }

    .textarea {
      min-height: 130px;
      resize: vertical;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #bbb;
      margin: 10px 0 14px;
      font-size: 0.92rem;
    }

    .hint {
      color: #8a8a8a;
      font-size: 0.85rem;
      margin-top: 8px;
      line-height: 1.4;
    }

    .message {
      min-height: 22px;
      margin-top: 12px;
      font-size: 0.9rem;
      color: #ff6b6b;
    }

    .success {
      color: #7dffb4;
    }

    .section-title {
      font-size: 1.2rem;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card {
      background: #101010;
      border: 1px solid #222;
      border-radius: 18px;
      padding: 18px;
    }

    .card.pinned {
      border-color: #f39c12;
      box-shadow: 0 0 0 1px rgba(243, 156, 18, 0.3);
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .card-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card-user img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      background: #1a1a1a;
      border: 1px solid #333;
    }

    .card-user-meta {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .card-username {
      color: #fff;
      font-size: 0.96rem;
      text-transform: uppercase;
    }

    .card-date {
      color: #7c7c7c;
      font-size: 0.8rem;
    }

    .pin-badge {
      color: #f39c12;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-title {
      font-size: 1.15rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-content {
      color: #d7d7d7;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .card-image {
      width: 100%;
      max-height: 500px;
      object-fit: cover;
      border-radius: 14px;
      margin-top: 14px;
      border: 1px solid #222;
    }

    .card-actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty {
      color: #7b7b7b;
      text-align: center;
      padding: 20px;
    }

    .admin-box {
      border-top: 1px solid #1e1e1e;
      margin-top: 18px;
      padding-top: 18px;
    }

    @media (max-width: 1050px) {
      .page {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        gap: 14px;
        align-items: stretch;
      }

      .nav-center,
      .top-actions {
        justify-content: center;
      }

      .search {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="left-profile" id="profileClick">
      <img id="topProfilePic" src="" alt="Profile Picture" />
      <div class="profile-meta">
        <div class="profile-name" id="topUsername">Loading...</div>
        <div class="profile-role" id="topRole">User</div>
      </div>
    </div>

    <div class="nav-center">
      <div class="nav-link active" id="postsTab">Posts</div>
      <div class="nav-link" id="forumTab">Forum</div>
    </div>

    <div class="top-actions">
      <input type="text" class="search" id="searchInput" placeholder="Search posts or forum..." />
      <button class="btn gray" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="page">
    <div class="sidebar">
      <div class="panel" id="postCreatorPanel">
        <div class="panel-title">Create Post</div>

        <div class="form-group">
          <input type="text" class="input" id="postTitle" placeholder="Post title" />
        </div>

        <div class="form-group">
          <textarea class="textarea" id="postContent" placeholder="Write your post here..."></textarea>
        </div>

        <div class="form-group">
          <input type="file" class="file-input" id="postImage" accept="image/*" />
        </div>

        <label class="checkbox-row" id="pinPostRow" style="display:none;">
          <input type="checkbox" id="pinPost" />
          <span>Pin this post</span>
        </label>

        <button class="btn" id="publishPostBtn">Publish Post</button>
        <div class="hint">Users can publish posts. Only admins can pin posts.</div>
        <div class="message" id="postMsg"></div>
      </div>

      <div class="panel" id="forumCreatorPanel" style="display:none;">
        <div class="panel-title">Create Forum Chat</div>

        <div class="form-group">
          <input type="text" class="input" id="forumTitle" placeholder="Forum title" />
        </div>

        <div class="form-group">
          <textarea class="textarea" id="forumContent" placeholder="Write forum topic here..."></textarea>
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="pinForum" />
          <span>Pin this forum chat</span>
        </label>

        <button class="btn" id="createForumBtn">Create Forum Chat</button>
        <div class="hint">Only administrators can create or pin forum chats.</div>
        <div class="message" id="forumMsg"></div>
      </div>

      <div class="panel admin-box" id="adminPanel" style="display:none;">
        <div class="panel-title">Admin Settings</div>

        <div class="form-group">
          <textarea class="textarea" id="adminUsersInput" placeholder="Enter usernames separated by commas"></textarea>
        </div>

        <button class="btn" id="saveAdminsBtn">Save Admin Usernames</button>
        <div class="hint">Anyone listed here becomes an admin. Others stay normal users.</div>
        <div class="message" id="adminMsg"></div>
      </div>
    </div>

    <div class="main">
      <div id="postsSection">
        <div class="section-title">Posts Database</div>
        <div class="feed" id="postsFeed"></div>
      </div>

      <div id="forumSection" style="display:none;">
        <div class="section-title">Forum</div>
        <div class="feed" id="forumFeed"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      addDoc,
      updateDoc,
      collection,
      getDocs,
      query,
      orderBy,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getStorage,
      ref,
      uploadBytes,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "PASTE_YOURS",
      authDomain: "PASTE_YOURS",
      projectId: "PASTE_YOURS",
      storageBucket: "PASTE_YOURS",
      messagingSenderId: "PASTE_YOURS",
      appId: "PASTE_YOURS"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const defaultAvatar = "https://via.placeholder.com/100?text=%20";

    let currentUser = null;
    let currentProfile = null;
    let isAdmin = false;
    let allPosts = [];
    let allForums = [];

    const topProfilePic = document.getElementById("topProfilePic");
    const topUsername = document.getElementById("topUsername");
    const topRole = document.getElementById("topRole");
    const logoutBtn = document.getElementById("logoutBtn");
    const profileClick = document.getElementById("profileClick");

    const postsTab = document.getElementById("postsTab");
    const forumTab = document.getElementById("forumTab");

    const postsSection = document.getElementById("postsSection");
    const forumSection = document.getElementById("forumSection");

    const postCreatorPanel = document.getElementById("postCreatorPanel");
    const forumCreatorPanel = document.getElementById("forumCreatorPanel");
    const adminPanel = document.getElementById("adminPanel");

    const pinPostRow = document.getElementById("pinPostRow");

    const postsFeed = document.getElementById("postsFeed");
    const forumFeed = document.getElementById("forumFeed");

    const searchInput = document.getElementById("searchInput");

    const postTitle = document.getElementById("postTitle");
    const postContent = document.getElementById("postContent");
    const postImage = document.getElementById("postImage");
    const pinPost = document.getElementById("pinPost");
    const publishPostBtn = document.getElementById("publishPostBtn");
    const postMsg = document.getElementById("postMsg");

    const forumTitle = document.getElementById("forumTitle");
    const forumContent = document.getElementById("forumContent");
    const pinForum = document.getElementById("pinForum");
    const createForumBtn = document.getElementById("createForumBtn");
    const forumMsg = document.getElementById("forumMsg");

    const adminUsersInput = document.getElementById("adminUsersInput");
    const saveAdminsBtn = document.getElementById("saveAdminsBtn");
    const adminMsg = document.getElementById("adminMsg");

    function formatDate(value) {
      if (!value) return "Just now";
      try {
        const date = value.toDate ? value.toDate() : new Date(value);
        return date.toLocaleString();
      } catch {
        return "Just now";
      }
    }

    function showMsg(el, text, ok = false) {
      el.textContent = text;
      el.className = ok ? "message success" : "message";
    }

    async function loadCurrentProfile(uid) {
      const profileRef = doc(db, "profiles", uid);
      const profileSnap = await getDoc(profileRef);

      if (!profileSnap.exists()) {
        return null;
      }

      return profileSnap.data();
    }

    async function checkAdmin(username) {
      const adminsRef = doc(db, "settings", "admins");
      const snap = await getDoc(adminsRef);

      if (!snap.exists()) return false;

      const data = snap.data();
      const list = Array.isArray(data.users) ? data.users : [];
      return list.map(v => String(v).toLowerCase()).includes(String(username).toLowerCase());
    }

    async function syncRole(uid, username) {
      const admin = await checkAdmin(username);
      isAdmin = admin;
      topRole.textContent = admin ? "Admin" : "User";

      if (currentProfile) {
        const currentRole = admin ? "admin" : "user";
        if (currentProfile.role !== currentRole) {
          await updateDoc(doc(db, "profiles", uid), { role: currentRole });
          currentProfile.role = currentRole;
        }
      }

      pinPostRow.style.display = admin ? "flex" : "none";
      forumCreatorPanel.style.display = admin ? "block" : "none";
      adminPanel.style.display = admin ? "block" : "none";
    }

    async function loadAdminListIntoBox() {
      if (!isAdmin) return;
      const adminsRef = doc(db, "settings", "admins");
      const snap = await getDoc(adminsRef);
      if (snap.exists()) {
        const data = snap.data();
        adminUsersInput.value = Array.isArray(data.users) ? data.users.join(", ") : "";
      } else {
        adminUsersInput.value = "";
      }
    }

    async function loadPosts() {
      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      allPosts = [];
      snap.forEach(d => allPosts.push({ id: d.id, ...d.data() }));
      renderPosts(allPosts);
    }

    async function loadForums() {
      const q = query(collection(db, "forums"), orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      allForums = [];
      snap.forEach(d => allForums.push({ id: d.id, ...d.data() }));
      renderForums(allForums);
    }

    function sortPinnedFirst(items) {
      return [...items].sort((a, b) => {
        const aPinned = a.pinned ? 1 : 0;
        const bPinned = b.pinned ? 1 : 0;
        if (aPinned !== bPinned) return bPinned - aPinned;

        const aTime = a.createdAt?.seconds || 0;
        const bTime = b.createdAt?.seconds || 0;
        return bTime - aTime;
      });
    }

    function renderPosts(items) {
      postsFeed.innerHTML = "";
      const sorted = sortPinnedFirst(items);

      if (!sorted.length) {
        postsFeed.innerHTML = `<div class="card empty">No posts yet.</div>`;
        return;
      }

      sorted.forEach(post => {
        const card = document.createElement("div");
        card.className = `card ${post.pinned ? "pinned" : ""}`;

        card.innerHTML = `
          <div class="card-head">
            <div class="card-user">
              <img src="${post.userPhotoURL || defaultAvatar}" alt="User">
              <div class="card-user-meta">
                <div class="card-username">${post.username || "Unknown User"}</div>
                <div class="card-date">${formatDate(post.createdAt)}</div>
              </div>
            </div>
            ${post.pinned ? `<div class="pin-badge">Pinned</div>` : ``}
          </div>
          <div class="card-title">${post.title || "Untitled Post"}</div>
          <div class="card-content">${post.content || ""}</div>
          ${post.imageURL ? `<img class="card-image" src="${post.imageURL}" alt="Post Image">` : ``}
        `;

        if (isAdmin) {
          const actions = document.createElement("div");
          actions.className = "card-actions";
          const pinBtn = document.createElement("button");
          pinBtn.className = "btn gray";
          pinBtn.textContent = post.pinned ? "Unpin" : "Pin";
          pinBtn.onclick = async () => {
            await updateDoc(doc(db, "posts", post.id), { pinned: !post.pinned });
            await loadPosts();
          };
          actions.appendChild(pinBtn);
          card.appendChild(actions);
        }

        postsFeed.appendChild(card);
      });
    }

    function renderForums(items) {
      forumFeed.innerHTML = "";
      const sorted = sortPinnedFirst(items);

      if (!sorted.length) {
        forumFeed.innerHTML = `<div class="card empty">No forum chats yet.</div>`;
        return;
      }

      sorted.forEach(forum => {
        const card = document.createElement("div");
        card.className = `card ${forum.pinned ? "pinned" : ""}`;
        card.innerHTML = `
          <div class="card-head">
            <div class="card-user">
              <img src="${defaultAvatar}" alt="Admin">
              <div class="card-user-meta">
                <div class="card-username">${forum.createdByUsername || "Admin"}</div>
                <div class="card-date">${formatDate(forum.createdAt)}</div>
              </div>
            </div>
            ${forum.pinned ? `<div class="pin-badge">Pinned</div>` : ``}
          </div>
          <div class="card-title">${forum.title || "Untitled Forum"}</div>
          <div class="card-content">${forum.content || ""}</div>
        `;

        if (isAdmin) {
          const actions = document.createElement("div");
          actions.className = "card-actions";
          const pinBtn = document.createElement("button");
          pinBtn.className = "btn gray";
          pinBtn.textContent = forum.pinned ? "Unpin" : "Pin";
          pinBtn.onclick = async () => {
            await updateDoc(doc(db, "forums", forum.id), { pinned: !forum.pinned });
            await loadForums();
          };
          actions.appendChild(pinBtn);
          card.appendChild(actions);
        }

        forumFeed.appendChild(card);
      });
    }

    function filterEverything(term) {
      const q = term.trim().toLowerCase();

      if (!q) {
        renderPosts(allPosts);
        renderForums(allForums);
        return;
      }

      const filteredPosts = allPosts.filter(item =>
        (item.title || "").toLowerCase().includes(q) ||
        (item.content || "").toLowerCase().includes(q) ||
        (item.username || "").toLowerCase().includes(q)
      );

      const filteredForums = allForums.filter(item =>
        (item.title || "").toLowerCase().includes(q) ||
        (item.content || "").toLowerCase().includes(q) ||
        (item.createdByUsername || "").toLowerCase().includes(q)
      );

      renderPosts(filteredPosts);
      renderForums(filteredForums);
    }

    postsTab.addEventListener("click", () => {
      postsTab.classList.add("active");
      forumTab.classList.remove("active");
      postsSection.style.display = "block";
      forumSection.style.display = "none";
    });

    forumTab.addEventListener("click", () => {
      forumTab.classList.add("active");
      postsTab.classList.remove("active");
      forumSection.style.display = "block";
      postsSection.style.display = "none";
    });

    searchInput.addEventListener("input", e => {
      filterEverything(e.target.value);
    });

    profileClick.addEventListener("click", () => {
      window.location.href = "profile.html";
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });

    publishPostBtn.addEventListener("click", async () => {
      showMsg(postMsg, "");

      if (!currentUser || !currentProfile) return;

      const title = postTitle.value.trim();
      const content = postContent.value.trim();
      const imageFile = postImage.files[0];

      if (!title && !content && !imageFile) {
        showMsg(postMsg, "Write something or add an image first.");
        return;
      }

      try {
        let imageURL = "";

        if (imageFile) {
          const imageRef = ref(storage, `posts/${currentUser.uid}/${Date.now()}-${imageFile.name}`);
          await uploadBytes(imageRef, imageFile);
          imageURL = await getDownloadURL(imageRef);
        }

        await addDoc(collection(db, "posts"), {
          uid: currentUser.uid,
          username: currentProfile.username || currentUser.displayName || "User",
          userPhotoURL: currentProfile.photoURL || currentUser.photoURL || "",
          title: title,
          content: content,
          imageURL: imageURL,
          pinned: isAdmin ? !!pinPost.checked : false,
          createdAt: serverTimestamp()
        });

        postTitle.value = "";
        postContent.value = "";
        postImage.value = "";
        pinPost.checked = false;

        showMsg(postMsg, "Post published.", true);
        await loadPosts();
      } catch (err) {
        showMsg(postMsg, err.message || "Could not publish post.");
      }
    });

    createForumBtn.addEventListener("click", async () => {
      showMsg(forumMsg, "");

      if (!isAdmin || !currentUser || !currentProfile) {
        showMsg(forumMsg, "Only admins can create forum chats.");
        return;
      }

      const title = forumTitle.value.trim();
      const content = forumContent.value.trim();

      if (!title && !content) {
        showMsg(forumMsg, "Add a forum title or content first.");
        return;
      }

      try {
        await addDoc(collection(db, "forums"), {
          title: title,
          content: content,
          pinned: !!pinForum.checked,
          createdByUid: currentUser.uid,
          createdByUsername: currentProfile.username || currentUser.displayName || "Admin",
          createdAt: serverTimestamp()
        });

        forumTitle.value = "";
        forumContent.value = "";
        pinForum.checked = false;

        showMsg(forumMsg, "Forum chat created.", true);
        await loadForums();
      } catch (err) {
        showMsg(forumMsg, err.message || "Could not create forum chat.");
      }
    });

    saveAdminsBtn.addEventListener("click", async () => {
      showMsg(adminMsg, "");

      if (!isAdmin) {
        showMsg(adminMsg, "Only admins can change admin settings.");
        return;
      }

      const list = adminUsersInput.value
        .split(",")
        .map(v => v.trim())
        .filter(Boolean);

      try {
        await setDoc(doc(db, "settings", "admins"), { users: list }, { merge: true });
        showMsg(adminMsg, "Admin usernames updated.", true);
      } catch (err) {
        showMsg(adminMsg, err.message || "Could not save admin usernames.");
      }
    });

    onAuthStateChanged(auth, async user => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      currentProfile = await loadCurrentProfile(user.uid);

      if (!currentProfile) {
        window.location.href = "profile.html";
        return;
      }

      topUsername.textContent = currentProfile.username || user.displayName || "User";
      topProfilePic.src = currentProfile.photoURL || defaultAvatar;

      await syncRole(user.uid, currentProfile.username || user.displayName || "User");
      await loadAdminListIntoBox();
      await loadPosts();
      await loadForums();
    });
  </script>
</body>
</html>
