<!DOCTYPE html>
<html>
<head>
  <title>Database</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .post-box textarea {
      width: 100%;
      height: 80px;
      background: #1c1c1c;
      color: white;
      border: none;
      padding: 10px;
    }

    .post-box button {
      margin-top: 10px;
      padding: 10px;
      background: orange;
      border: none;
    }

    .post {
      background: #111;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="top">
  <div id="user"></div>
</div>

<div class="post-box">
  <textarea id="postText" placeholder="Write something..."></textarea>
  <button onclick="addPost()">Post</button>
</div>

<div id="posts"></div>

<script>
const user = localStorage.getItem("username") || "User";
document.getElementById("user").innerText = user;

function addPost() {
  const text = document.getElementById("postText").value;
  if (!text) return;

  const div = document.createElement("div");
  div.className = "post";
  div.innerText = user + ": " + text;

  document.getElementById("posts").prepend(div);
}
</script>

</body>
</html>
