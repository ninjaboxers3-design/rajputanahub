<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <style>
    @font-face {
      font-family: 'FuturaBook';
      src: url('FuturaCyrillicBook.ttf') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'FuturaBook', Arial, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .box {
      width: 100%;
      max-width: 540px;
      text-align: center;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 36px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    input {
      width: 100%;
      height: 72px;
      margin-bottom: 22px;
      padding: 0 22px;
      border: 1px solid #2e2e2e;
      border-radius: 16px;
      background: #1a1a1a;
      color: #fff;
      font-size: 1.2rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {
      color: #8a8a8a;
    }

    input:focus {
      border-color: #f39c12;
      box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.15);
    }

    button {
      width: 100%;
      height: 72px;
      border: none;
      border-radius: 16px;
      background: #555;
      color: #aaa;
      font-size: 1.15rem;
      cursor: not-allowed;
      transition: background 0.2s ease, color 0.2s ease;
    }

    button.active {
      background: #f39c12;
      color: #000;
      cursor: pointer;
    }

    button.active:hover {
      background: #ffab2e;
    }

    #msg {
      min-height: 24px;
      margin-top: 16px;
      color: #ff6b6b;
      font-size: 0.95rem;
    }

    .bottom-link {
      margin-top: 20px;
      font-size: 1rem;
    }

    .bottom-link a {
      color: #f39c12;
      text-decoration: none;
    }

    .bottom-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Login</h1>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <button id="loginBtn" disabled>Login</button>

    <div id="msg"></div>

    <div class="bottom-link">
      Need an account? <a href="signup.html">Sign Up</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "PASTE_YOURS",
      authDomain: "PASTE_YOURS",
      projectId: "PASTE_YOURS",
      storageBucket: "PASTE_YOURS",
      messagingSenderId: "PASTE_YOURS",
      appId: "PASTE_YOURS"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const msg = document.getElementById("msg");

    function updateButton() {
      const ok = email.value.trim() && password.value.trim();
      loginBtn.disabled = !ok;
      loginBtn.classList.toggle("active", !!ok);
    }

    email.addEventListener("input", updateButton);
    password.addEventListener("input", updateButton);

    loginBtn.addEventListener("click", async () => {
      msg.textContent = "";

      try {
        await signInWithEmailAndPassword(auth, email.value.trim(), password.value);
        window.location.href = "index.html";
      } catch (error) {
        msg.textContent = "Invalid email or password.";
      }
    });
  </script>
</body>
</html>
