<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>

  <!-- 🔥 Futura Font -->
  <style>
    @font-face {
      font-family: 'FuturaBook';
      src: url('FuturaCyrillicBook.ttf') format('truetype');
    }

    body {
      margin: 0;
      background: #000;
      font-family: 'FuturaBook', Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .box {
      width: 400px;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: #1c1c1c;
      color: white;
      font-size: 16px;
    }

    input:focus {
      outline: none;
      background: #2a2a2a;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      background: gray;
      color: white;
      cursor: not-allowed;
      transition: 0.2s;
    }

    button.active {
      background: orange;
      cursor: pointer;
    }

    .error {
      color: red;
      font-size: 13px;
      margin-top: 5px;
    }

    a {
      display: block;
      margin-top: 15px;
      color: orange;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>SIGN UP</h1>

  <input type="text" id="username" placeholder="Username">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <div class="error" id="error"></div>

  <button id="signupBtn">Create Account</button>

  <a href="login.html">Already have an account? Login</a>
</div>

<!-- 🔥 FIREBASE SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  updateProfile 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔴 PUT YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Inputs
const username = document.getElementById("username");
const email = document.getElementById("email");
const password = document.getElementById("password");
const btn = document.getElementById("signupBtn");
const errorBox = document.getElementById("error");

// 🔥 Enable button only when valid
function validate() {
  const pass = password.value;

  const validPass =
    pass.length >= 6 && /\d/.test(pass); // 6 chars + 1 number

  if (username.value && email.value && validPass) {
    btn.classList.add("active");
    btn.disabled = false;
  } else {
    btn.classList.remove("active");
    btn.disabled = true;
  }
}

username.oninput = validate;
email.oninput = validate;
password.oninput = validate;

// 🔥 SIGNUP
btn.addEventListener("click", async () => {

  try {
    const userCred = await createUserWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );

    // Save username
    await updateProfile(userCred.user, {
      displayName: username.value
    });

    // Save locally for later use
    localStorage.setItem("username", username.value);

    // ✅ REDIRECT TO DATABASE
    window.location.href = "database.html";

  } catch (err) {
    errorBox.innerText = err.message;
  }

});

</script>

</body>
</html>
