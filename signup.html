<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>

  <style>
    @font-face {
      font-family: 'FuturaBook';
      src: url('FuturaCyrillicBook.ttf') format('truetype');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'FuturaBook', Arial, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .box {
      width: 100%;
      max-width: 540px;
      text-align: center;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 36px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    input {
      width: 100%;
      height: 72px;
      margin-bottom: 22px;
      padding: 0 22px;
      border: 1px solid #2e2e2e;
      border-radius: 16px;
      background: #1a1a1a;
      color: #fff;
      font-size: 1.2rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {
      color: #8a8a8a;
    }

    input:focus {
      border-color: #f39c12;
      box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.15);
    }

    button {
      width: 100%;
      height: 72px;
      border: none;
      border-radius: 16px;
      background: #555;
      color: #aaa;
      font-size: 1.15rem;
      cursor: not-allowed;
      transition: background 0.2s ease, color 0.2s ease;
    }

    button.active {
      background: #f39c12;
      color: #000;
      cursor: pointer;
    }

    button.active:hover {
      background: #ffab2e;
    }

    #msg {
      min-height: 24px;
      margin-top: 16px;
      color: #ff6b6b;
      font-size: 0.95rem;
    }

    .bottom-link {
      margin-top: 20px;
      font-size: 1rem;
    }

    .bottom-link a {
      color: #f39c12;
      text-decoration: none;
    }

    .bottom-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Sign Up</h1>

    <input type="text" id="username" placeholder="Username" maxlength="20" />
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <button id="signupBtn" disabled>Create Account</button>

    <div id="msg"></div>

    <div class="bottom-link">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "PASTE_YOURS",
      authDomain: "PASTE_YOURS",
      projectId: "PASTE_YOURS",
      storageBucket: "PASTE_YOURS",
      messagingSenderId: "PASTE_YOURS",
      appId: "PASTE_YOURS"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const username = document.getElementById("username");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const signupBtn = document.getElementById("signupBtn");
    const msg = document.getElementById("msg");

    function validPassword(pw) {
      return pw.length >= 5 && /\d/.test(pw);
    }

    function validUsername(name) {
      return /^[a-zA-Z0-9_]{3,20}$/.test(name.trim());
    }

    function validEmail(mail) {
      return /\S+@\S+\.\S+/.test(mail.trim());
    }

    function updateButton() {
      const ok =
        validUsername(username.value) &&
        validEmail(email.value) &&
        validPassword(password.value);

      signupBtn.disabled = !ok;
      signupBtn.classList.toggle("active", ok);
    }

    username.addEventListener("input", updateButton);
    email.addEventListener("input", updateButton);
    password.addEventListener("input", updateButton);

    signupBtn.addEventListener("click", async () => {
      msg.textContent = "";

      const cleanUsername = username.value.trim();
      const cleanEmail = email.value.trim();
      const cleanPassword = password.value;
      const normalizedUsername = cleanUsername.toLowerCase();

      if (!validUsername(cleanUsername)) {
        msg.textContent = "Username must be 3-20 letters, numbers, or underscores.";
        return;
      }

      if (!validPassword(cleanPassword)) {
        msg.textContent = "Password must be at least 5 characters and include 1 number.";
        return;
      }

      try {
        const usernameRef = doc(db, "usernames", normalizedUsername);
        const usernameSnap = await getDoc(usernameRef);

        if (usernameSnap.exists()) {
          msg.textContent = "Username already picked.";
          return;
        }

        const userCredential = await createUserWithEmailAndPassword(auth, cleanEmail, cleanPassword);

        await updateProfile(userCredential.user, {
          displayName: cleanUsername
        });

        await setDoc(usernameRef, {
          uid: userCredential.user.uid,
          username: cleanUsername,
          createdAt: serverTimestamp()
        });

        await setDoc(doc(db, "profiles", userCredential.user.uid), {
          username: cleanUsername,
          email: cleanEmail,
          createdAt: serverTimestamp()
        });

        window.location.href = "login.html";
      } catch (error) {
        if (error.code === "auth/email-already-in-use") {
          msg.textContent = "Email is already in use.";
        } else if (error.code === "auth/invalid-email") {
          msg.textContent = "Invalid email.";
        } else {
          msg.textContent = error.message;
        }
      }
    });
  </script>
</body>
</html>
