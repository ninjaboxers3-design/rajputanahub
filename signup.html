<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>

  <style>
    @font-face {
      font-family: 'FuturaBook';
      src: url('FuturaCyrillicBook.ttf');
    }

    body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'FuturaBook';
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      opacity: 0;
      transition: 0.4s;
    }

    body.show { opacity: 1; }

    .box {
      width: 400px;
      text-align: center;
    }

    h1 { margin-bottom: 20px; }

    input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: #1c1c1c;
      color: white;
    }

    button {
      width: 100%;
      padding: 15px;
      background: gray;
      border: none;
      border-radius: 10px;
      color: white;
      margin-top: 10px;
    }

    button.active {
      background: orange;
      cursor: pointer;
    }

    .error { color: red; }
  </style>
</head>

<body>

<div class="box">
  <h1>SIGN UP</h1>

  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <div class="error" id="error"></div>

  <button id="btn">Create Account</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "PUT_YOURS",
  authDomain: "PUT_YOURS",
  projectId: "PUT_YOURS"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const username = document.getElementById("username");
const email = document.getElementById("email");
const password = document.getElementById("password");
const btn = document.getElementById("btn");
const errorBox = document.getElementById("error");

window.onload = () => document.body.classList.add("show");

function validate() {
  if (username.value && email.value && password.value.length >= 6 && /\d/.test(password.value)) {
    btn.classList.add("active");
  } else {
    btn.classList.remove("active");
  }
}

username.oninput = validate;
email.oninput = validate;
password.oninput = validate;

btn.onclick = async () => {
  try {
    const user = await createUserWithEmailAndPassword(auth, email.value, password.value);

    await updateProfile(user.user, {
      displayName: username.value
    });

    localStorage.setItem("username", username.value);

    document.body.style.opacity = "0";

    setTimeout(() => {
      window.location.replace("database.html");
    }, 300);

  } catch (err) {
    errorBox.innerText = err.message;
  }
};

</script>

</body>
</html>
